<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or 'Suscripción vencida' }} - Zentral</title>
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
    <div class="w-full max-w-xl">
        <div class="bg-white border border-gray-200 rounded-2xl shadow-sm p-8">
            <div class="flex items-center gap-3">
                <div class="h-12 w-12 rounded-full bg-red-50 flex items-center justify-center border border-red-100">
                    <span class="text-2xl">!</span>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">Suscripción vencida</h1>
                    <p class="mt-1 text-sm text-gray-600">Tu acceso al sistema ha sido suspendido porque la suscripción se encuentra vencida.</p>
                </div>
            </div>

            <div class="mt-5 text-sm text-gray-700">
                Para continuar utilizando el sistema, contacta con soporte o renueva tu suscripción.
            </div>

            <div class="mt-6 flex flex-col sm:flex-row gap-3">
                <a href="mailto:soporte@zentral.com" class="inline-flex items-center justify-center px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700">
                    Contactar soporte
                </a>
                <a href="{{ url_for('auth.login') }}" class="inline-flex items-center justify-center px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-200 rounded-md hover:bg-gray-50">
                    Volver al login
                </a>
            </div>
        </div>

        <div class="mt-4 text-xs text-gray-500 text-center">
            Zentral
        </div>
    </div>
</body>
</html>
